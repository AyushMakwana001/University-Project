<!-- profile.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>My Profile | Nexus University</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="bg-gray-50">
    <div class="flex min-h-screen">
      <aside class="w-72 bg-indigo-950 text-white fixed h-full">
        <div class="p-6">
          <i class="fas fa-university text-2xl text-amber-400"></i
          ><span class="font-sora font-bold text-xl ml-2"
            >Nexus<span class="text-amber-400">University</span></span
          >
        </div>
        <nav class="flex flex-col gap-1 p-4">
          <a
            href="dashboard-student.html"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a
          ><a
            href="profile.html"
            class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-user-circle"></i><span>My Profile</span></a
          ><a
            href="marksheet.html"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-chart-bar"></i><span>Marksheet</span></a
          ><a
            href="hall-ticket.html"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-ticket-alt"></i><span>Hall Ticket</span></a
          >
        </nav>
      </aside>
      <main class="flex-1 ml-72 p-8">
        <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-sm p-8">
          <div class="text-center">
            <div
              class="w-24 h-24 bg-indigo-100 rounded-full flex items-center justify-center mx-auto"
            >
              <i class="fas fa-user-graduate text-4xl text-indigo-700"></i>
            </div>
            <h2 class="text-2xl font-bold mt-4">Olivia Chen</h2>
            <p class="text-gray-500">CS2024001 · B.Tech CSE</p>
          </div>
          <div class="grid md:grid-cols-2 gap-6 mt-8">
            <div>
              <label class="text-sm text-gray-500">Full Name</label>
              <p class="font-medium">Olivia Chen</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">Roll Number</label>
              <p class="font-medium">CS2024001</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">Email</label>
              <p class="font-medium">olivia.chen@nexus.edu</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">Program</label>
              <p class="font-medium">B.Tech Computer Science</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">Semester</label>
              <p class="font-medium">4th Semester</p>
            </div>
            <div>
              <label class="text-sm text-gray-500">Admission Year</label>
              <p class="font-medium">2023</p>
            </div>
          </div>
          <div class="mt-8 p-4 bg-indigo-50 rounded-lg">
            <p class="text-sm text-indigo-800">
              <i class="fas fa-info-circle mr-2"></i>For any corrections, please
              contact the registrar's office.
            </p>
          </div>
        </div>
      </main>
    </div>
    <script src="assets/js/app.js"></script>
  </body>
</html>
