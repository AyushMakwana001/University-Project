<!-- teacher-login.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Login | Nexus University</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="assets/css/custom.css">
</head>
<body class="bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-900 min-h-screen flex items-center justify-center p-4">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-amber-500 rounded-2xl shadow-lg mb-4">
                <i class="fas fa-chalkboard-user text-3xl text-slate-900"></i>
            </div>
            <h1 class="text-2xl font-bold text-white">Faculty Portal</h1>
            <p class="text-indigo-200 mt-1">Secure access for educators</p>
        </div>

        <div class="bg-white/10 backdrop-blur-md rounded-2xl shadow-2xl p-8 border border-white/20">
            <form id="teacherLoginForm">
                <div class="mb-5">
                    <label class="block text-sm font-semibold text-white mb-2">Employee ID / Email</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3 top-1/2 -translate-y-1/2 text-indigo-300"></i>
                        <input type="email" id="teacherEmail" class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-white/50 focus:border-amber-400 focus:ring-2 focus:ring-amber-400/30 transition" placeholder="faculty@nexus.edu" required>
                    </div>
                </div>
                <div class="mb-6">
                    <label class="block text-sm font-semibold text-white mb-2">Password</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-3 top-1/2 -translate-y-1/2 text-indigo-300"></i>
                        <input type="password" id="teacherPassword" class="w-full pl-10 pr-4 py-3 bg-white/20 border border-white/30 rounded-xl text-white placeholder-white/50 focus:border-amber-400 focus:ring-2 focus:ring-amber-400/30 transition" placeholder="••••••••" required>
                    </div>
                </div>
                <button type="submit" class="w-full bg-amber-500 text-slate-900 py-3 rounded-xl font-semibold hover:bg-amber-400 transition shadow-lg">
                    <i class="fas fa-chalkboard mr-2"></i> Access Dashboard
                </button>
            </form>
            <div class="mt-6 text-center text-sm text-indigo-200">
                <p>Demo: <span class="font-mono">faculty@nexus.edu</span> / <span class="font-mono">admin123</span></p>
                <a href="index.html" class="text-amber-300 hover:underline mt-3 inline-block"><i class="fas fa-arrow-left mr-1"></i> Back to Home</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('teacherLoginForm')?.addEventListener('submit', function(e) {
            e.preventDefault();
            window.location.href = 'dashboard-teacher.html';
        });
    </script>
    <script src="assets/js/app.js"></script>
</body>
</html>
