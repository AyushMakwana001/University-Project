<!-- marksheet.html -->
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Marksheet | Nexus University</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <link rel="stylesheet" href="assets/css/custom.css" />
  </head>
  <body class="bg-gray-50">
    <div class="flex min-h-screen">
      <aside class="w-72 bg-indigo-950 text-white fixed h-full">
        <div class="p-6">
          <i class="fas fa-university text-2xl text-amber-400"></i
          ><span class="font-sora font-bold text-xl ml-2"
            >Nexus<span class="text-amber-400">University</span></span
          >
        </div>
        <nav class="flex flex-col gap-1 p-4">
          <a
            href="dashboard-student.html"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></a
          ><a
            href="marksheet.html"
            class="sidebar-item active flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-chart-bar"></i><span>Marksheet</span></a
          ><a
            href="hall-ticket.html"
            class="sidebar-item flex items-center gap-3 px-4 py-3 rounded-lg"
            ><i class="fas fa-ticket-alt"></i><span>Hall Ticket</span></a
          >
        </nav>
      </aside>
      <main class="flex-1 ml-72 p-8">
        <div class="bg-white rounded-xl shadow-sm p-8">
          <div class="text-center border-b pb-6">
            <h1 class="text-2xl font-bold">Academic Transcript</h1>
            <p class="text-gray-500">Semester IV | B.Tech CSE</p>
          </div>
          <table class="w-full mt-6">
            <thead class="bg-gray-100">
              <tr>
                <th class="p-3 text-left">Course Code</th>
                <th>Subject</th>
                <th>Credits</th>
                <th>Marks</th>
                <th>Grade</th>
              </tr>
            </thead>
            <tbody>
              <tr class="border-b">
                <td class="p-3">CS301</td>
                <td>Data Structures</td>
                <td>4</td>
                <td>87</td>
                <td class="text-emerald-600 font-semibold">A</td>
              </tr>
              <tr class="border-b">
                <td class="p-3">CS302</td>
                <td>Algorithms</td>
                <td>4</td>
                <td>91</td>
                <td class="text-emerald-600 font-semibold">A+</td>
              </tr>
              <tr class="border-b">
                <td class="p-3">CS303</td>
                <td>Database Systems</td>
                <td>3</td>
                <td>85</td>
                <td class="text-emerald-600 font-semibold">A</td>
              </tr>
              <tr class="border-b">
                <td class="p-3">CS304</td>
                <td>Operating Systems</td>
                <td>3</td>
                <td>78</td>
                <td class="text-amber-600 font-semibold">B+</td>
              </tr>
            </tbody>
          </table>
          <div class="mt-6 p-4 bg-gray-50 rounded-lg flex justify-between">
            <span class="font-bold">SGPA: 8.72</span
            ><span class="font-bold">CGPA: 8.92</span>
          </div>
          <button
            id="downloadMarksheetBtn"
            class="mt-6 bg-indigo-900 text-white px-6 py-2 rounded-lg"
          >
            <i class="fas fa-download mr-2"></i>Download as PDF
          </button>
        </div>
      </main>
    </div>
    <script>
      document
        .getElementById("downloadMarksheetBtn")
        ?.addEventListener("click", () =>
          alert("PDF download - integrate jsPDF or backend stream"),
        );
    </script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
